version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myapp/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /myapp/docker-credentials/password
    DOCKER_REGISTRY_URL: /myapp/docker-registry/url
  variables:
    IMAGE_REPO_NAME: aws-node-todo-app-cicd
    IMAGE_TAG: v1

phases:
  install:
    runtime-versions:
      nodejs: 12.2.0
    commands:
      - echo Installing Node.js and npm...
      - n 12.2.0
      - npm config set registry https://registry.npmjs.org/

  pre_build:
    commands:
      - echo Logging in to Docker Registry...
      - echo "DOCKER_REGISTRY_URL=$DOCKER_REGISTRY_URL"
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin "$DOCKER_REGISTRY_URL"

      # For Docker Hub, the image name should be <username>/<repo>
      - IMAGE_NAME="$DOCKER_REGISTRY_USERNAME/$IMAGE_REPO_NAME"
      - echo "IMAGE_NAME (pre_build) = $IMAGE_NAME"
      - echo "IMAGE_TAG = $IMAGE_TAG"

  build:
    commands:
      - echo Build started on `date`
      - echo Packaging application into a zip file...
      - zip -r node-todo-app.zip * .[^.]*

      # Recompute IMAGE_NAME in this phase
      - IMAGE_NAME="$DOCKER_REGISTRY_USERNAME/$IMAGE_REPO_NAME"
      - echo "IMAGE_NAME (build) = $IMAGE_NAME"

      - echo "Building Docker image $IMAGE_NAME:latest ..."
      - docker build -t $IMAGE_NAME:latest .
      - docker tag $IMAGE_NAME:latest $IMAGE_NAME:$IMAGE_TAG

  post_build:
    commands:
      - echo Build completed on `date`

      # Recompute IMAGE_NAME again for this phase
      - IMAGE_NAME="$DOCKER_REGISTRY_USERNAME/$IMAGE_REPO_NAME"
      - echo "IMAGE_NAME (post_build) = $IMAGE_NAME"

      - echo "Pushing Docker images..."
      - docker push $IMAGE_NAME:latest
      - docker push $IMAGE_NAME:$IMAGE_TAG

      - echo Uploading zip file to S3 root location...
      - aws s3 cp node-todo-app.zip s3://my-codepipeline-artifacts-n/node-todo-app/

      - echo Writing image definitions file...
      - printf '{"ImageURI":"%s", "Port":8000}' $IMAGE_NAME:$IMAGE_TAG > imageDefinitions.json
      - cat imageDefinitions.json

artifacts:
  files:
    - '**/*'
  base-directory: '.'
  discard-paths: no
  exclude-patterns:
    - 'node_modules/**/*'
    - '.git/**/*'
    - '.gitignore'
    - 'README.md'
    - 'package-lock.json'
